name: Lint

on:
  pull_request:
    paths:
      - "awesome-skills.md"
      - "CONTRIBUTING.md"
      - "README.md"
      - "skills/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/lint.yml"

jobs:
  skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate skills
        run: npm run lint

      - name: Test scripts
        run: npm test

      - name: Typecheck scripts
        run: npm run typecheck
