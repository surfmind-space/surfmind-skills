name: Lint

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/lint.yml"

jobs:
  skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate skills
        run: npm run lint

      - name: Typecheck scripts
        run: npm run typecheck
