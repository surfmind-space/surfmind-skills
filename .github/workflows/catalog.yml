name: Catalog

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/catalog.yml"
      - "CONTRIBUTING.md"
      - "README.md"
      - "awesome-skills.md"
      - "package-lock.json"
      - "package.json"
      - "scripts/**"
      - "skills/**"

permissions:
  contents: write

jobs:
  update-generated:
    name: Update generated catalog
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate catalog tables
        run: npm run generate:catalog

      - name: Commit generated tables
        run: |
          if git diff --quiet -- README.md awesome-skills.md; then
            echo "Generated catalog tables are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md awesome-skills.md
          git commit -m "chore: update generated catalog"
          git push

      - name: Validate catalog
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck
