name: Catalog

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/catalog.yml"
      - "CONTRIBUTING.md"
      - "README.md"
      - "awesome-skills.md"
      - "package-lock.json"
      - "package.json"
      - "scripts/**"
      - "skills/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-generated:
    name: Update generated catalog
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate catalog tables
        run: npm run generate:catalog

      - name: Validate catalog
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Create generated catalog pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.SURFMIND_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: chore/generated-catalog
          delete-branch: true
          title: "chore: update generated catalog"
          commit-message: "chore: update generated catalog"
          body: |
            This PR was created automatically after changes landed on `main`.

            It refreshes the generated catalog tables in `README.md` and
            `awesome-skills.md` without pushing directly to the protected
            `main` branch.
          add-paths: |
            README.md
            awesome-skills.md
