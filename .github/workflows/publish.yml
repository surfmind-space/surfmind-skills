name: Publish

on:
  push:
    branches:
      - main
    paths:
      - "awesome-skills.md"
      - "skills/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/publish.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish changed skills
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          SKILLS_ADMIN_API_KEY: ${{ secrets.SKILLS_ADMIN_API_KEY }}
          SURFMIND_API_URL: ${{ vars.SURFMIND_API_URL }}
        run: npm run publish
